name: 'pipelingo_demo'
version: '1.0.0'
config-version: 2

profile: 'pipelingo_demo'

model-paths: ["models"]
seed-paths: ["seeds"]
target-path: "target"
clean-targets:
  - "target"
  - "dbt_packages"

models:
  pipelingo_demo:
    staging:
      +materialized: view
      +schema: staging
    intermediate:
      +materialized: table
      +schema: intermediate
    marts:
      +materialized: table
      +schema: marts

seeds:
  pipelingo_demo:
    +schema: raw
