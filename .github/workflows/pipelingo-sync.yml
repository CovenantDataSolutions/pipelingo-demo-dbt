name: Pipelingo Sync

on:
  push:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 8 * * *'  # daily at 08:00 UTC

jobs:
  build-and-sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dbt
        run: pip install dbt-core dbt-snowflake

      - name: Write Snowflake private key
        env:
          SNOWFLAKE_PRIVATE_KEY: ${{ secrets.SNOWFLAKE_PRIVATE_KEY }}
        run: |
          mkdir -p ~/.dbt
          # GitHub multiline secrets preserve newlines.
          printf '%s' "$SNOWFLAKE_PRIVATE_KEY" > ~/.dbt/rsa_key.p8
          chmod 600 ~/.dbt/rsa_key.p8

      - name: Configure dbt profile
        run: |
          cat > ~/.dbt/profiles.yml <<'EOF'
          pipelingo_demo:
            target: prod
            outputs:
              prod:
                type: snowflake
                account: ${{ secrets.SNOWFLAKE_ACCOUNT }}
                user: ${{ secrets.SNOWFLAKE_USER }}
                private_key_path: /home/runner/.dbt/rsa_key.p8
                role: ${{ secrets.SNOWFLAKE_ROLE }}
                database: ${{ secrets.SNOWFLAKE_DATABASE }}
                warehouse: ${{ secrets.SNOWFLAKE_WAREHOUSE }}
                schema: marts
                threads: 4
          EOF

      - name: dbt debug (connectivity check)
        run: dbt debug

      - name: dbt build
        id: dbt
        run: |
          dbt deps || true
          dbt seed
          dbt run
          dbt test
        continue-on-error: true  # still upload artifacts even if tests fail

      - name: Show what dbt produced
        if: always()
        run: ls -la target/ 2>/dev/null || echo "no target/ directory — dbt failed before producing artifacts"

      - name: Upload artifacts to Pipelingo
        if: always()
        run: |
          if [ ! -f target/manifest.json ]; then
            echo "::error::target/manifest.json missing — the dbt step above failed. See its log for the real error." >&2
            exit 1
          fi
          ARGS=(-F "manifest=@target/manifest.json")
          if [ -f target/run_results.json ]; then
            ARGS+=(-F "run_results=@target/run_results.json")
          else
            echo "::warning::target/run_results.json missing — uploading manifest only."
          fi
          curl -fsS -X POST \
            -H "Authorization: Bearer ${{ secrets.PIPELINGO_TOKEN }}" \
            "${ARGS[@]}" \
            https://pipelingo-production-97a9.up.railway.app/api/dbt/ingest
